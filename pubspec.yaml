name: functional_parenting
description: "A new Flutter project."
publish_to: "none" # Remove this line if you wish to publish to pub.dev

version: 1.0.0+5

environment:
  sdk: ^3.12.0

dependencies:
  cloud_firestore: ^6.6.0
  cupertino_icons: ^1.0.8
  firebase_auth: ^6.5.4
  firebase_core: ^4.11.0
  flutter:
    sdk: flutter
  flutter_hooks: ^0.21.3+1
  flutter_local_notifications: ^22.0.1
  flutter_riverpod: ^2.6.1
  flutter_timezone: ^4.1.1
  go_router: ^15.0.0
  google_fonts: ^6.2.1
  hooks_riverpod: ^2.6.1
  intl: ^0.20.2
  shared_preferences: ^2.3.3
  timezone: ^0.11.1
  url_launcher: ^6.3.2

dev_dependencies:
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_native_splash: ^2.4.4
  flutter_test:
    sdk: flutter

# Native splash screen. Light: navy logo on near-white; dark: white/sage logo
# on navy. Regenerate with: dart run flutter_native_splash:create
flutter_native_splash:
  color: "#F4F5F8"
  color_dark: "#0A0F2C"
  image: assets/splash/splash_light.png
  image_dark: assets/splash/splash_dark.png
  android_12:
    color: "#F4F5F8"
    color_dark: "#0A0F2C"
    image: assets/splash/splash_light.png
    image_dark: assets/splash/splash_dark.png
  android: true
  ios: true
  web: false

# App icon generation. iOS is handled manually (single-size AppIcon set with
# light/dark/tinted appearances), so only Android is generated here.
# Regenerate Android icons with: dart run flutter_launcher_icons
flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon_light_1024.png"
  adaptive_icon_background: "#A0C2DA"
  adaptive_icon_foreground: "assets/icon/icon_fg.png"
  adaptive_icon_monochrome: "assets/icon/icon_mono.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon/

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
