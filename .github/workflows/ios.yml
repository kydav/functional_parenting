name: iOS — Deploy

# Manual only — does not run on push/PR.
on:
  workflow_dispatch:

# ── Required repo secrets (Settings → Secrets and variables → Actions) ────────
#   GOOGLE_SERVICE_INFO_PLIST        base64 of ios/Runner/GoogleService-Info.plist
#   IOS_DIST_CERT_P12_BASE64         base64 of the Apple Distribution cert (.p12)
#   IOS_DIST_CERT_PASSWORD           password used when exporting that .p12
#   IOS_TEAM_ID                      Apple Developer Team ID (10 chars)
#   APP_STORE_CONNECT_KEY_ID         App Store Connect API key ID
#   APP_STORE_CONNECT_ISSUER_ID      App Store Connect API issuer ID
#   APP_STORE_CONNECT_PRIVATE_KEY    contents of the API key .p8 file
#
# Signing is cloud-managed via the API key (-allowProvisioningUpdates), so no
# provisioning-profile secret is needed. The API key must have the "App Manager"
# role (or higher) so it can manage signing assets.
# ─────────────────────────────────────────────────────────────────────────────

jobs:
  deploy:
    name: Build & upload to TestFlight
    runs-on: macos-latest
    env:
      BUNDLE_ID: app.auaha.functionalparenting
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

      - name: Restore Firebase config
        env:
          GOOGLE_SERVICE_INFO_PLIST: ${{ secrets.GOOGLE_SERVICE_INFO_PLIST }}
        run: echo "$GOOGLE_SERVICE_INFO_PLIST" | base64 --decode > ios/Runner/GoogleService-Info.plist

      - name: Import signing certificate
        uses: apple-actions/import-codesign-certs@v3
        with:
          p12-file-base64: ${{ secrets.IOS_DIST_CERT_P12_BASE64 }}
          p12-password: ${{ secrets.IOS_DIST_CERT_PASSWORD }}

      # Write the App Store Connect API key so xcodebuild can manage signing
      # itself (-allowProvisioningUpdates). Automatic signing only touches the
      # app target — a manually specified profile would be forced onto the SPM
      # package targets (Firebase, gRPC, …), which don't support profiles.
      - name: Write App Store Connect API key
        env:
          ASC_PRIVATE_KEY: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
        run: |
          echo "$ASC_PRIVATE_KEY" > "$RUNNER_TEMP/asc_authkey.p8"

      - name: Write ExportOptions.plist
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
        run: |
          cat > ios/ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>automatic</string>
            <key>teamID</key><string>${TEAM_ID}</string>
            <key>uploadBitcode</key><false/>
            <key>uploadSymbols</key><true/>
          </dict>
          </plist>
          EOF

      # Compile the Flutter/SPM side unsigned, then archive + export with
      # automatic signing (cloud-managed via the API key), which signs only the
      # Runner target and leaves the package dependencies unsigned.
      - name: Build signed IPA
        env:
          TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          ASC_KEY_ID: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
        run: |
          flutter build ios --release --no-codesign
          xcodebuild -workspace ios/Runner.xcworkspace \
            -scheme Runner -configuration Release \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" archive \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_authkey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID" \
            DEVELOPMENT_TEAM="$TEAM_ID" \
            CODE_SIGN_STYLE=Automatic
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/Runner.xcarchive" \
            -exportOptionsPlist ios/ExportOptions.plist \
            -exportPath "$RUNNER_TEMP/ipa" \
            -allowProvisioningUpdates \
            -authenticationKeyPath "$RUNNER_TEMP/asc_authkey.p8" \
            -authenticationKeyID "$ASC_KEY_ID" \
            -authenticationKeyIssuerID "$ASC_ISSUER_ID"

      - name: Upload to TestFlight
        uses: apple-actions/upload-testflight-build@v3
        with:
          app-path: ${{ runner.temp }}/ipa/*.ipa
          issuer-id: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
          api-key-id: ${{ secrets.APP_STORE_CONNECT_KEY_ID }}
          api-private-key: ${{ secrets.APP_STORE_CONNECT_PRIVATE_KEY }}
